<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #333; display: flex; gap: 40px; padding: 40px; align-items: flex-start; }
  .label { color: white; text-align: center; font-family: sans-serif; margin-bottom: 10px; }
  .container { display: flex; flex-direction: column; align-items: center; }
  img, svg { width: 512px; height: 512px; }
</style>
</head>
<body>
  <div class="container">
    <div class="label">Original (512px favicon)</div>
    <img src="../website/deployment/favicon-512.png" width="512" height="512"/>
  </div>
  <div class="container">
    <div class="label">Recreated (SVG)</div>
    <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="68" ry="68" fill="#08080b"/>
      <!-- Arc / headband -->
      <path d="M 136 159 A 192 192 0 0 1 376 159" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
      <!-- Main orange ring -->
      <circle cx="256" cy="281" r="96" fill="none" stroke="#f0a030" stroke-width="32"/>
      <!-- Center dot -->
      <circle cx="256" cy="281" r="30" fill="#f0a030"/>
      <!-- Left headphone ear cup -->
      <rect x="123" y="251" width="40" height="71" rx="10" ry="10" fill="white"/>
      <!-- Right headphone ear cup -->
      <rect x="349" y="251" width="40" height="71" rx="10" ry="10" fill="white"/>
    </svg>
  </div>
</body>
</html>
