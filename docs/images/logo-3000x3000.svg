<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 512 512">
  <!-- Background: dark rounded rectangle -->
  <rect width="512" height="512" rx="80" ry="80" fill="#1a1a1a"/>

  <!-- Orange ring (main circle) -->
  <circle cx="256" cy="280" r="105" fill="none" stroke="#f0a030" stroke-width="38"/>

  <!-- Orange center dot -->
  <circle cx="256" cy="280" r="30" fill="#f0a030"/>

  <!-- White arc above (signal/wifi curve) -->
  <path d="M 175 185 A 115 115 0 0 1 337 185" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Left headphone ear cup -->
  <rect x="128" y="255" width="24" height="50" rx="12" ry="12" fill="white"/>

  <!-- Right headphone ear cup -->
  <rect x="360" y="255" width="24" height="50" rx="12" ry="12" fill="white"/>
</svg>
