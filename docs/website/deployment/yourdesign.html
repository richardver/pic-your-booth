/* ============================================================
   PICYOURBOOTH — YOUR DESIGN
   Branded splash → TemplatesBooth widget embed
   ============================================================ */

:root {
  --void:        #050508;
  --bg:          #08080b;
  --surface:     #111116;
  --surface-up:  #18181e;
  --text:        #ededf0;
  --text-muted:  rgba(237, 237, 240, 0.75);
  --border:      rgba(255, 255, 255, 0.06);
  --gold:        #f59e42;
  --gold-light:  #ffb86b;
  --gold-dim:    rgba(245, 158, 66, 0.10);
  --gold-glow:   rgba(245, 158, 66, 0.20);
  --font-display: 'Bebas Neue', Impact, sans-serif;
  --font-body:    'Space Grotesk', -apple-system, sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow: hidden;
}

body.scrollable {
  overflow: auto;
}

/* -- Confetti Canvas ----------------------------------- */
#confetti {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

/* -- Splash Screen ------------------------------------- */
.splash {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background: var(--bg);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}

.splash.hidden {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.splash-logo {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  letter-spacing: 2px;
  text-decoration: none;
  color: var(--text);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.2s forwards;
}

.splash-logo .logo-camera {
  width: 1.1em;
  height: 1.1em;
  margin-right: 6px;
  flex-shrink: 0;
}

.splash-logo .logo-accent {
  color: var(--gold);
}

.splash-logo .logo-icon {
  width: 0.85em;
  height: 0.85em;
  margin-left: 4px;
  flex-shrink: 0;
}

.splash-event {
  font-family: var(--font-body);
  font-size: clamp(0.95rem, 2.5vw, 1.1rem);
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.4s forwards;
}

.splash-event:empty {
  display: none;
}

.splash-headline {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 10vw, 5rem);
  line-height: 1;
  letter-spacing: 3px;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.6s forwards;
}

.splash-headline .gold {
  color: var(--gold);
}

.splash-sub {
  font-size: clamp(1rem, 3vw, 1.2rem);
  color: var(--text-muted);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.8s forwards;
}

.splash-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 1rem 2.5rem;
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  letter-spacing: 2px;
  color: var(--bg);
  background: var(--gold);
  border: none;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 1s forwards;
}

.splash-cta:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px var(--gold-glow);
}

.splash-cta:active {
  transform: scale(0.97);
}

.splash-cta svg {
  width: 1.2em;
  height: 1.2em;
}

/* -- Widget (iframe phase) ----------------------------- */
.widget {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s var(--ease);
}

.widget.active {
  opacity: 1;
  pointer-events: auto;
}

.widget-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.widget-logo {
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 1.5px;
  color: var(--text);
  text-decoration: none;
}

.widget-logo .logo-camera {
  width: 0.9em;
  height: 0.9em;
  margin-right: 4px;
}

.widget-logo .logo-accent {
  color: var(--gold);
}

.widget-logo .logo-icon {
  width: 0.7em;
  height: 0.7em;
  margin-left: 3px;
}

.widget-help {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0.4rem 0.9rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.widget-help:hover {
  color: var(--gold);
}

.widget-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: #ffffff;
}

/* -- Thank You state ----------------------------------- */
.thankyou {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background: var(--bg);
}

.thankyou.active {
  display: flex;
}

.thankyou-logo {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  letter-spacing: 2px;
  text-decoration: none;
  color: var(--text);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.2s forwards;
}

.thankyou-logo .logo-camera {
  width: 1.1em;
  height: 1.1em;
  margin-right: 6px;
  flex-shrink: 0;
}

.thankyou-logo .logo-accent {
  color: var(--gold);
}

.thankyou-logo .logo-icon {
  width: 0.85em;
  height: 0.85em;
  margin-left: 4px;
  flex-shrink: 0;
}

.thankyou h1 {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 10vw, 5rem);
  line-height: 1;
  letter-spacing: 3px;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.4s forwards;
}

.thankyou h1 .gold {
  color: var(--gold);
}

.thankyou p {
  font-size: clamp(1rem, 3vw, 1.2rem);
  color: var(--text-muted);
  margin-bottom: 2rem;
  max-width: 500px;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.6s forwards;
}

.thankyou-home {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0.8rem 2rem;
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 2px;
  color: var(--gold);
  background: var(--gold-dim);
  border: 1px solid rgba(245, 158, 66, 0.2);
  border-radius: 999px;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.8s forwards;
}

.thankyou-home:hover {
  background: var(--gold-glow);
  border-color: rgba(245, 158, 66, 0.4);
}

/* -- Error state --------------------------------------- */
.error {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background: var(--bg);
}

.error.active {
  display: flex;
}

.error h2 {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 2px;
  margin-bottom: 1rem;
}

.error p {
  color: var(--text-muted);
  margin-bottom: 2rem;
  max-width: 400px;
}

.error a {
  color: var(--gold);
}

/* -- Animations ---------------------------------------- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var submitted = params.get('submitted');
  var eventName = params.get('event');

  // Show thank you state if redirected after submission
  if (submitted === 'true') {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('thankyou').classList.add('active');

    // Fire confetti for the thank you screen too
    startConfetti();

    if (typeof gtag === 'function') {
      gtag('event', 'design_submitted', {
        event_category: 'template_portal',
        event_label: eventName || 'unknown'
      });
    }
    return;
  }

  // Show event name if provided
  if (eventName) {
    document.getElementById('eventName').textContent = eventName;
  }

  // Start confetti on splash
  startConfetti();

  // Transition to widget
  document.getElementById('openWidget').addEventListener('click', function() {
    var splash = document.getElementById('splash');
    var widget = document.getElementById('widget');

    confettiRunning = false;
    document.getElementById('confetti').style.display = 'none';

    splash.classList.add('hidden');
    setTimeout(function() {
      splash.style.display = 'none';
      widget.classList.add('active');
      document.body.classList.add('scrollable');
    }, 600);

    if (typeof gtag === 'function') {
      gtag('event', 'design_widget_opened', {
        event_category: 'template_portal',
        event_label: eventName || 'unknown'
      });
    }
  });

  // GA page view
  if (typeof gtag === 'function') {
    gtag('event', 'design_portal_view', {
      event_category: 'template_portal',
      event_label: eventName || 'unknown'
    });
  }

  // -- Confetti engine
  var confettiRunning = false;

  function startConfetti() {
    var canvas = document.getElementById('confetti');
    var ctx = canvas.getContext('2d');
    var pieces = [];
    var colors = ['#f59e42', '#ffb86b', '#ededf0', '#8b5cf6', '#f59e42', '#ffb86b'];
    confettiRunning = true;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomRange(min, max) { return Math.random() * (max - min) + min; }

    for (var i = 0; i < 120; i++) {
      pieces.push({
        x: randomRange(0, canvas.width),
        y: randomRange(-canvas.height, -10),
        w: randomRange(6, 12),
        h: randomRange(4, 8),
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: randomRange(0, Math.PI * 2),
        rotSpeed: randomRange(-0.05, 0.05),
        vy: randomRange(2, 5),
        vx: randomRange(-1.5, 1.5),
        wobble: randomRange(0, Math.PI * 2),
        wobbleSpeed: randomRange(0.03, 0.08),
        opacity: 1
      });
    }

    function draw() {
      if (!confettiRunning) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (var i = pieces.length - 1; i >= 0; i--) {
        var p = pieces[i];
        p.y += p.vy;
        p.x += p.vx + Math.sin(p.wobble) * 0.5;
        p.wobble += p.wobbleSpeed;
        p.rotation += p.rotSpeed;

        if (p.y > canvas.height * 0.7) {
          p.opacity = Math.max(0, 1 - (p.y - canvas.height * 0.7) / (canvas.height * 0.3));
        }

        if (p.y > canvas.height || p.opacity <= 0) {
          pieces.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }

      if (pieces.length > 0) {
        requestAnimationFrame(draw);
      }
    }

    requestAnimationFrame(draw);
  }
})();
</script>
